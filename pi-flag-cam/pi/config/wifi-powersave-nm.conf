# Force WiFi power-save OFF durably.
# NetworkManager owns wlan0 here and re-applies its default (power-save ON) at
# every association, overriding the udev `iw ... set power_save off` one-shot.
# This is the authoritative control. Deployed to:
#   /etc/NetworkManager/conf.d/wifi-powersave.conf
# 2 = disable power save (NM_SETTING_WIRELESS_POWERSAVE_DISABLE).
[connection]
wifi.powersave = 2
