# Pi Flag Cam — memory-pressure tuning for the 512MB Pi Zero W.
# Deployed to /etc/sysctl.d/99-pi-flag-cam.conf
# Prefer dropping clean page cache over swapping to (CPU-costly) zram.
vm.swappiness = 10
# Keep a reserve so atomic allocations in the network RX path don't fail
# (the udp_fail_queue_rcv_skb oops is an allocation failure under WiFi+USB load).
vm.min_free_kbytes = 16384
# Larger socket/UDP receive buffers reduce RX-overflow under heavy WiFi load
# (apt download / streaming), which is what trips the udp_fail_queue_rcv_skb
# oops. Paired with coherent_pool=8M on the kernel cmdline (set by optimize-pi).
net.core.rmem_max = 2500000
net.core.rmem_default = 1048576
