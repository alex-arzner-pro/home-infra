# Pi Flag Cam — SSH keepalive to prevent connection drops
# Deployed to /etc/ssh/sshd_config.d/pi-flag-cam.conf

# Server pings client every 30 seconds
ClientAliveInterval 30

# Disconnect after 3 missed pings (90 seconds of no response)
ClientAliveCountMax 3

# Enable TCP keepalive (usually default, but be explicit)
TCPKeepAlive yes
