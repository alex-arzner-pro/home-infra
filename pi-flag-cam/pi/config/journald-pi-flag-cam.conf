# Pi Flag Cam — journald configuration
# Deployed to /etc/systemd/journald.conf.d/pi-flag-cam.conf
#
# Volatile storage writes logs to RAM (/run/log/journal) instead of SD card,
# reducing SD card wear. Logs are lost on reboot.

[Journal]
Storage=volatile
SystemMaxUse=50M
MaxRetentionSec=7day
Compress=yes
