# Pi Flag Cam — blacklist unnecessary kernel modules
# Deployed to /etc/modprobe.d/pi-flag-cam-blacklist.conf

# Bluetooth (disabled via dtoverlay=disable-bt in config.txt)
blacklist bluetooth
blacklist hci_uart
blacklist btbcm
blacklist ecdh_generic

# Audio (disabled via dtparam=audio=off in config.txt)
blacklist snd_bcm2835
blacklist snd_usb_audio
blacklist snd_soc_hdmi_codec

# Luxafor HID LED — kernel driver conflicts with userspace HID access (python3-hid)
# Causes "Setting an LED's brightness failed (-38)" errors and device contention
# blacklist alone is not enough — udev reloads on every HID open/close
blacklist hid_led
install hid_led /bin/false

# CSI camera pipeline (we use USB webcam via uvcvideo, not CSI)
blacklist bcm2835_v4l2
blacklist bcm2835_codec
blacklist bcm2835_isp
blacklist bcm2835_mmal_vchiq

# Display/DRM stack (headless — saves ~600KB RAM)
blacklist drm
blacklist drm_panel_orientation_quirks
blacklist backlight

# IPv6 (not used — saves ~508KB RAM)
blacklist ipv6

# FUSE (not needed)
blacklist fuse

# Firewall (not needed on LAN appliance)
blacklist ip_tables
blacklist x_tables
blacklist nfnetlink

# Misc (not needed)
blacklist binfmt_misc
blacklist uio
blacklist uio_pdrv_genirq
