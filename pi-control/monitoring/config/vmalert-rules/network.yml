groups:
  - name: network
    rules:
      - alert: ICMPProbeFailing
        expr: probe_success{job="blackbox-icmp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ICMP probe to {{ $labels.instance }} failing — possible internet outage"

      - alert: HTTPTargetDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP probe to {{ $labels.instance }} failing"

      - alert: HighProbeLatency
        expr: probe_duration_seconds{job="blackbox-icmp"} > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency to {{ $labels.instance }}: {{ $value | printf \"%.0f\" }}ms"

      - alert: SSLCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL cert for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days"
