route:
  receiver: telegram
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      repeat_interval: 1h
    - match:
        severity: warning
      repeat_interval: 12h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: '%%ALERTMANAGER_TELEGRAM_TOKEN%%'
        chat_id: %%ALERTMANAGER_TELEGRAM_CHAT_ID%%
        parse_mode: HTML
        message: |-
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} <b>{{ .Labels.alertname }}</b>
          {{ .Annotations.summary }}
          {{ end }}
